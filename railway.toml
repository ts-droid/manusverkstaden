[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build && cd server && npm install && npx prisma generate"

[deploy]
startCommand = "cd server && export DATABASE_URL=${DATABASE_PUBLIC_URL:-$DATABASE_URL} && npx prisma migrate resolve --applied 0001_init 2>/dev/null; npx prisma db push --accept-data-loss && node src/index.js"
